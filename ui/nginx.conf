server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA client-side routing: fall back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # In production the API is proxied to the in-cluster API service.
  # The upstream host is injected at deploy time (K8s service DNS).
  location /api/ {
    proxy_pass http://personal-crm-api:8080;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
  }
}
